server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}

# Configuracion JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Configuracion SMTP para envio de resultados
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
mail.brand.name=${MAIL_BRAND_NAME:MirsanLab}
mail.contact.email=${MAIL_CONTACT_EMAIL:}
mail.contact.phone=${MAIL_CONTACT_PHONE:}

# Bootstrap admin (solo primer arranque)
bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Administrador}
bootstrap.admin.phone=${BOOTSTRAP_ADMIN_PHONE:}

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
